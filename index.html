<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무재해 사고일수 알림판 - OP1/OP2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', 'Helvetica Neue', sans-serif; background-color: #000; color: #fff; overflow: hidden; }

        .main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 배경 이미지 wrapper */
        .background-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
        }

        /* 섹션 공통 스타일 */
        .operation-section {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            text-align: center;
            /* 배경 대비 가독성을 위한 레이어 */
            background: rgba(0, 0, 0, 0.4); 
        }

        /* 로고 영역 */
        .logo-area {
            position: absolute;
            top: 40px;
            left: 40px;
        }
        .logo-area img {
            width: 150px; /* 로고 크기 확대 */
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
        }

        /* OP1, OP2 텍스트 */
        .operation-name {
            font-size: 100px; /* 대폭 확대 */
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-shadow: 4px 4px 10px rgba(0,0,0,1);
        }

        /* 무재해일수 타이틀 */
        .main-title {
            font-size: 45px;
            font-weight: 700;
            color: #eee;
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
        }

        /* 사고일수 숫자 표시 */
        .accident-free-days {
            font-size: 200px; /* 사이니지용 대형 사이즈 */
            font-weight: 900;
            color: #BDF918;
            line-height: 0.9;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 10px 30px rgba(0,0,0,1);
            background: rgba(0, 0, 0, 0.4); /* 검정 음영 */
            width: 60%;                   /* 좌우로 끝까지 뻗게 함 */
            padding: 20px 0;               /* 상하 여백만 유지 */
            border-radius: 8px;              /* 끝까지 뻗으므로 곡선 제거 */
            
            display: flex;
            align-items: center;
            justify-content: center;
        }

         /* 하단 슬로건 (수정된 버전) */
        .subtitle {
            font-size: 42px;         /* 글자 크기는 크게 유지 */
            margin-top: 30px;
            font-weight: 600;
            color: #ffffff;          /* 글자색 다시 흰색으로 */
            background: none;        /* 형광색 배경 제거 */
            padding: 10px 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9); /* 가독성을 위한 그림자 */
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        /* 구분선 */
        .divider {
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #BDF918 0%, #7aaa0e 50%, #BDF918 100%);
            box-shadow: 0 0 20px rgba(189, 249, 24, 0.5);
            z-index: 4;
        }

        /* 최하단 고정 문구 */
        .footer-text {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 30px;
            color: #BDF918;
            font-weight: 800;
            text-shadow: 2px 2px 5px #000;
            letter-spacing: 5px;
            z-index: 5;
        }
    </style>
</head>
<body>
<div id="videoOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:1000; background:#000;">
        <video id="eduVideo" muted playsinline style="width:100%; height:100%; object-fit:contain;">
            <source src="test_video.mp4" type="video/mp4">
        </video>
    </div>
	
	<div class="main-container">
        <div class="background-wrapper" id="backgroundWrapper"></div>

        <div class="operation-section">
            <div class="logo-area"><img src="./logo.png" alt="logo"></div>
            <div class="operation-name">OP1</div>
            <div class="main-title">무재해일수</div>
            <div class="accident-free-days" id="op1DayCounter">0</div>
            <div class="subtitle" id="op1Subtitle">안전이 최고의 가치입니다</div>
        </div>


        <div class="operation-section">
            <div class="logo-area"><img src="./logo.png" alt="logo"></div>
            <div class="operation-name">OP2</div>
            <div class="main-title">무재해일수</div>
            <div class="accident-free-days" id="op2DayCounter">0</div>
            <div class="subtitle" id="op2Subtitle">안전이 최고의 가치입니다</div>
            <div class="footer-text">THINK SAFETY WORK SAFELY</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            subtitles: [
                '함께 만드는 안전한 작업장',
                '나의 안전이 동료의 안전입니다',
                '안전한 직장, 행복한 가족',
                '안전이 최고의 가치입니다',
                '무재해는 우리의 목표입니다',
                '안전 없이는 성공도 없습니다'
            ],
            backgroundImages: [
                'background1.jpg', 'background2.jpg', 'background3.jpg', 
                'background4.jpg', 'background5.jpg', 'background6.jpg', 'background7.jpg'
            ],
            op1StartDate: new Date('2024-06-12'),
            op2StartDate: new Date('2024-10-24'), 
            playInterval: 10000 		
		
		};

        let currentIndexOP1 = 0;
        let currentIndexOP2 = 0;
        let bgIndex = 0;

        function rotateBackground() {
            const bgWrapper = document.getElementById('backgroundWrapper');
            bgIndex = (bgIndex + 1) % CONFIG.backgroundImages.length;
            bgWrapper.style.backgroundImage = `url('./${CONFIG.backgroundImages[bgIndex]}')`;
        }

        function rotateSubtitle(elementId, indexRef) {
            const subtitle = document.getElementById(elementId);
            subtitle.style.opacity = '0';
            setTimeout(() => {
                subtitle.textContent = CONFIG.subtitles[indexRef % CONFIG.subtitles.length];
                subtitle.style.opacity = '1';
            }, 500);
        }

        function updateCounters() {
            const today = new Date();
            today.setHours(0,0,0,0);

            const calc = (start) => {
                const s = new Date(start);
                s.setHours(0,0,0,0);
                return Math.max(0, Math.floor((today - s) / (1000 * 60 * 60 * 24)));
            };

            document.getElementById('op1DayCounter').textContent = calc(CONFIG.op1StartDate);
            document.getElementById('op2DayCounter').textContent = calc(CONFIG.op2StartDate);
        }

function initialize() {
            const videoOverlay = document.getElementById('videoOverlay');
            const video = document.getElementById('eduVideo');
            const mainUI = document.querySelector('.main-container');

            // 기존 배경/카운터 설정 (디자인 유지)
            document.getElementById('backgroundWrapper').style.backgroundImage = `url('./${CONFIG.backgroundImages[0]}')`;
            updateCounters();
            
            // 타이머 설정들
            setInterval(() => {
                rotateSubtitle('op1Subtitle', currentIndexOP1++);
                rotateSubtitle('op2Subtitle', currentIndexOP2++);
            }, 10000);
            setInterval(rotateBackground, 10000);
            setInterval(updateCounters, 60000);
            setInterval(() => { window.location.reload(); }, 3600000);

            // 영상 재생 로직 (추가된 부분)
            function playVideo() {
                mainUI.style.display = 'none';      // 전광판 숨기기
                videoOverlay.style.display = 'block'; // 비디오 보이기
                video.play().catch(e => console.log("비디오 재생 시작"));
            }

            video.onended = () => {
                videoOverlay.style.display = 'none';
                mainUI.style.display = 'flex';
                setTimeout(playVideo, CONFIG.playInterval); // 10초 뒤 다시 재생
            };

            // 처음 시작 후 10초 뒤에 영상 첫 실행
            setTimeout(playVideo, CONFIG.playInterval);
        }
		
        window.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
